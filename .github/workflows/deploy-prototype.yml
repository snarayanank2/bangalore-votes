name: Deploy prototype to Pages
on:
  push:
    branches: [main]
    paths: ['prototype/**', '.github/workflows/deploy-prototype.yml']
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prototype
    steps:
      - uses: actions/checkout@v4
      # Node 24: the test setup shims fetch/AbortController via undici@8 to work around
      # jsdom shadowing AbortController (which breaks data-router navigation). undici@8
      # needs a Node newer than 20, and the suite is developed and verified on 24 — CI
      # must match, or `npm run test` dies in undici before any test runs.
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm, cache-dependency-path: prototype/package-lock.json }
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with: { path: prototype/dist }
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
