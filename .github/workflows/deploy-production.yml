# Production deploy (architecture §14.3-§14.4). Two independent triggers:
#
#   1. `release: published` — a real deploy. Publishing a GitHub Release
#      with a date tag (vYYYY.MM.DD[.n]) builds the image FRESH FROM THE
#      RELEASED TAG's commit (checkout `ref: tag_name`, not `:edge`),
#      pushes `:latest` + `:<tag>`, then SSHes in and runs
#      pull -> migrate -> up -d -> prune, in that order (§14.7: migration
#      strictly before restart).
#
#   2. `workflow_dispatch` with a `tag` input — ROLLBACK. Re-deploys an
#      EXISTING, already-pushed image tag: pull -> up -d -> prune. There is
#      NO migrate step on this path (see the `deploy` job's per-step `if:`
#      below) — migrations are forward-only/backward-compatible
#      (architecture §14.7) and down-migrations aren't supported, so a
#      rollback must never touch the schema.
#
# DEPLOY DIR: /opt/bangalore-votes on the Droplet, checked out once by the
# Task 63 provisioning runbook (architecture §14.6 step 4) — same
# convention as deploy-staging.yml.
#
# SECRETS: DEPLOY_HOST / DEPLOY_USER / DEPLOY_SSH_KEY are `production`
# GitHub-Environment secrets, distinct from the `staging` environment's
# secrets of the same name. The `environment: production` declaration
# below is also where the architecture §14.4 human-reviewer protection
# rule attaches (an optional required-reviewers gate configured in repo
# Settings -> Environments -> production; this workflow only declares the
# environment, it doesn't configure the gate itself).
name: deploy-production

# Serialize deploys/rollbacks against the same box: two overlapping runs
# each doing pull -> migrate -> up would race against each other mid-
# migration. `cancel-in-progress: false` so an in-flight deploy always
# finishes (rather than being killed mid-migrate) and the next one queues
# behind it.
concurrency:
  group: deploy-production
  cancel-in-progress: false

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing GHCR image tag to roll back to (e.g. v2026.07.20 or v2026.07.20.2). Must already exist in GHCR - this path never builds.'
        required: true
        type: string

jobs:
  # Only for a real release publish. Skipped entirely for workflow_dispatch
  # (rollback reuses an already-pushed image and must never rebuild).
  build-and-push:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # Fresh build from the RELEASED TAG's commit, not from whatever
      # `:edge` happens to be — the release tag is the source of truth for
      # what "production" means.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/snarayanank2/bangalore-votes:latest
            ghcr.io/snarayanank2/bangalore-votes:${{ github.event.release.tag_name }}

  deploy:
    needs: build-and-push
    # `needs: build-and-push` would otherwise skip this job whenever
    # build-and-push itself is skipped (the workflow_dispatch/rollback
    # path, where it never runs). `always()` overrides that, and the two
    # branches below cover both real triggers explicitly:
    #   - release: only deploy if the fresh build actually succeeded.
    #   - workflow_dispatch: always allowed to proceed (build-and-push was
    #     never meant to run on this path).
    if: |
      always() &&
      ((github.event_name == 'release' && needs.build-and-push.result == 'success') ||
       github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment: production
    # SSH-only job (no GitHub API calls beyond checkout-free steps below) —
    # least-privilege: no `packages:write` needed here, that's build-and-push's.
    permissions:
      contents: read
    steps:
      # `github.event.release.tag_name` and `inputs.tag` are attacker-
      # influenced (a release tag name / workflow_dispatch input can contain
      # arbitrary text). Never interpolate `${{ }}` of either directly into
      # a `run:`/`script:` body — that's shell-evaluated BEFORE the shell
      # runs and is a script-injection sink. Pass them through `env:`
      # instead (an env assignment from `${{ }}` is safe: it becomes an
      # environment variable, not shell-evaluated text), then validate the
      # resolved tag against the strict date-tag format before it is ever
      # used, so a malformed/malicious tag fails closed here rather than
      # reaching the SSH deploy steps.
      - name: Resolve image tag for this deploy
        id: vars
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="$RELEASE_TAG"
          else
            TAG="$DISPATCH_TAG"
          fi
          if ! [[ "$TAG" =~ ^v[0-9]{4}\.[0-9]{2}\.[0-9]{2}(\.[0-9]+)?$ ]]; then
            echo "::error::Resolved image tag '$TAG' does not match the required vYYYY.MM.DD[.n] format." >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      # Step 1: pull. Runs on BOTH a real release deploy and a rollback.
      # The resolved (and regex-validated) tag is forwarded into the remote
      # shell via appleboy/ssh-action's `envs:` input, never interpolated
      # into `script:` text directly.
      - name: Pull images
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: ${{ steps.vars.outputs.tag }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: IMAGE_TAG
          script: |
            set -euo pipefail
            cd /opt/bangalore-votes
            IMAGE_TAG="$IMAGE_TAG" docker compose -f deploy/compose.production.yml pull

      # Step 2: migrate. `if:` restricts this to the `release` event only
      # — it must NEVER run on workflow_dispatch (rollback). This is the
      # concrete guard called for by architecture §14.4/§14.7.
      - name: Run migration (release deploys only, never on rollback)
        if: github.event_name == 'release'
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: ${{ steps.vars.outputs.tag }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: IMAGE_TAG
          script: |
            set -euo pipefail
            cd /opt/bangalore-votes
            IMAGE_TAG="$IMAGE_TAG" docker compose -f deploy/compose.production.yml run --rm app npm run migrate

      # Step 3: restart + prune. Runs on both paths. On a real release
      # deploy this only executes if step 2's migration succeeded (a
      # failed migrate aborts its script and fails the step before this
      # one runs); on rollback it runs right after the pull, with no
      # schema step in between.
      - name: Restart stack
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: ${{ steps.vars.outputs.tag }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: IMAGE_TAG
          script: |
            set -euo pipefail
            cd /opt/bangalore-votes
            IMAGE_TAG="$IMAGE_TAG" docker compose -f deploy/compose.production.yml up -d
            docker image prune -f
