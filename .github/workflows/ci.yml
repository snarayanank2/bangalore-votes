name: ci
on: { push: { branches: [main] }, pull_request: {} }
jobs:
  # Runs on every push AND every pull_request (including forks). Never
  # builds or pushes an image — that's build-and-push, below, which is
  # gated to push-to-main only.
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env: { POSTGRES_PASSWORD: test, POSTGRES_DB: bv_test }
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:test@localhost:5432/bv_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run translate -- --check
      - run: npm run typecheck
      - run: npm run migrate     # no-op until M1; real runner lands in Task 4
      - run: npm test
      - run: npm run build

  # Builds the Task 59 image and pushes it to GHCR (architecture §14.3),
  # but ONLY for a push that landed on main — never for a pull_request
  # (untrusted fork PRs must not get GITHUB_TOKEN packages:write, and PRs
  # never deploy). deploy-staging.yml picks up the `:edge` tag pushed here
  # via its own `workflow_run` trigger.
  build-and-push:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/snarayanank2/bangalore-votes
          # Every main build gets :sha-<short-sha> and :edge (architecture
          # §14.3). No :latest here — that's reserved for release builds
          # (deploy-production.yml), built fresh from the release tag.
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=edge
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
