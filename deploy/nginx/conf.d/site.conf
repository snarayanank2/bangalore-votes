# Reverse proxy / micro-cache config (Task 60, architecture.md §5/§7/§14).
#
# Three server blocks:
#   1. production — bangalore-votes.opencity.in
#   2. a `default_server` that rejects any TLS handshake / request whose
#      Host doesn't match a name declared below (architecture §14.5's
#      Cloud-Firewall-adjacent defense: never present a cert, or proxy
#      anything, for an unlisted hostname).
#   3. staging — staging.bangalore-votes.opencity.in (architecture §14.2:
#      "invisible to the public": noindex + basic auth, proxies to the
#      separate app-staging:4321 container).
#
# UPSTREAM NAMES (`app:4321`, `app-staging:4321`) are Compose service names
# from Task 61, not yet built — this file only assumes they exist on the
# same Docker network nginx's container joins (architecture §14.2: "staging
# joins its [nginx's] network"). See the CI/local validation note in
# task-60-report.md for how this file's syntax is checked without that
# Compose stack.
#
# CERT PATHS (`/etc/letsencrypt/live/<host>/{fullchain,privkey}.pem`) follow
# certbot's standard on-disk layout on the volume shared between the
# certbot and nginx containers (architecture §14.5); the exact volume mount
# is Task 61's concern.
#
# CSP: intentionally NOT set anywhere in this file — see
# snippets/security-headers.conf's own comment and src/lib/csp.ts. The app
# emits Content-Security-Policy per request; nginx only passes it through.

# ---------------------------------------------------------------------------
# 1. Production
# ---------------------------------------------------------------------------
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name bangalore-votes.opencity.in;

  ssl_certificate     /etc/letsencrypt/live/bangalore-votes.opencity.in/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/bangalore-votes.opencity.in/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  include /etc/nginx/snippets/security-headers.conf;

  # ACME HTTP-01 challenge (architecture §14.5) — served from the shared
  # certbot webroot volume, never proxied to the app.
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Applied to every proxy_pass below via context inheritance (nginx only
  # skips inherited proxy_set_header directives for a location that sets
  # ANY proxy_set_header of its own — the public "/" location and the
  # ward-issues/data location below both repeat all four explicitly because
  # they also need the Cookie-stripping header alongside them). Twilio signs
  # its webhook against
  # `https://<host>/api/webhooks/twilio` and src/pages/api/webhooks/twilio.ts
  # reconstructs that exact URL from X-Forwarded-Proto + Host to verify the
  # signature (Task 53) — a missing/wrong value on ANY proxied location
  # (not just /api/webhooks/) would make that reconstruction wrong wherever
  # it's relied on, so this is set once, here, for the whole server rather
  # than repeated (and risking a forgotten copy) in every location.
  proxy_set_header Host bangalore-votes.opencity.in;
  proxy_set_header X-Forwarded-Proto https;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

  # --- /media/: curator-uploaded photos/affidavits (Task 35) — publicly
  # cacheable, long TTL (content-addressed by hash, so a URL never changes
  # meaning; see src/pages/media/[id]/[hash].ts).
  location /media/ {
    proxy_pass http://app:4321;
    proxy_cache pages;
    proxy_cache_valid 200 30d;
  }

  # --- /api/otp/: OTP request/verify — its OWN, much stricter rate zone
  # (must be declared before the general /api/ location loses to it on
  # specificity anyway — nginx picks the longest matching PREFIX
  # regardless of declaration order; both are prefix locations).
  location /api/otp/ {
    limit_req zone=otp burst=5;
    proxy_pass http://app:4321;
  }

  # --- /api/webhooks/: Twilio/SendGrid vendor callbacks (Task 53) — its
  # OWN generous rate zone (never shares/competes with citizen /api/
  # traffic), and — see the server-level proxy_set_header block above —
  # inherits the pinned Host + X-Forwarded-Proto https every proxied
  # location gets, which is what makes the app's Twilio-signature URL
  # reconstruction line up. Exempt from the app's own CSRF/Origin check
  # (src/middleware.ts) but NOT from this rate zone.
  location /api/webhooks/ {
    limit_req zone=webhook burst=200;
    proxy_pass http://app:4321;
  }

  # --- /api/: everything else under /api (issue votes, flags, ward lookup,
  # /api/me, /api/eoi, …) — the coarse general-purpose zone.
  location /api/ {
    limit_req zone=api burst=60 nodelay;
    proxy_pass http://app:4321;
  }

  # --- authenticated form routes: NEVER cached, cookies pass through
  # untouched. `(kn/)?` covers the /kn/ twins that actually exist for
  # account/login (src/pages/kn/account/*, src/pages/kn/login.astro) — the
  # brief's literal excerpt for this location omitted the /kn/ prefix, but
  # leaving it out would let a bare `/` (public, cache+cookie-stripped)
  # location catch /kn/account instead, which would strip that visitor's
  # session cookie and let the response be cached for the next visitor —
  # the exact class of bug already fixed once at the app layer (see
  # src/middleware.ts's "Task 48 review / Task 26 bug" comment on its own
  # locale-prefix stripping). `(account|curator|admin|login)(/|$)` mirrors
  # src/middleware.ts's `isUnder()` boundary (a prefix must be followed by
  # `/` or end-of-string) so this never accidentally matches an unrelated
  # future path that happens to start with one of these words.
  location ~ ^/(kn/)?(account|curator|admin|login)(/|$) {
    proxy_pass http://app:4321;
  }

  # --- static assets, served directly by nginx from the app image's build
  # output (Task 61 mounts /srv/static from the app image/build; not this
  # task's concern).
  location /data/gba.geojson {
    root /srv/static;
    expires 1d;
  }

  # NB: add_header is all-or-nothing per location — a location that
  # declares ANY add_header of its own inherits NONE of the server-level
  # security-headers.conf include (HSTS/nosniff/Referrer-Policy would
  # otherwise be silently dropped on every built JS/CSS asset response).
  # Re-including the snippet here, and folding the immutable Cache-Control
  # into a single add_header (rather than `expires 1y;` PLUS a separate
  # `add_header Cache-Control immutable;`, which would emit two
  # Cache-Control headers), keeps this location's headers complete and
  # correct without relying on inheritance at all.
  location /_astro/ {
    root /srv/static;
    include /etc/nginx/snippets/security-headers.conf;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  # --- shorter-TTL public pages: ward issue-voting pages (live vote tallies,
  # PRD §5.5) and the city-wide /data metrics page — both change often
  # enough that the default 60s public-page TTL below would still be fine,
  # but the brief calls for a slightly longer window here specifically
  # (5m) since these are heavier aggregate queries worth caching a bit
  # longer once computed. Matches the /kn/ twins of both routes too.
  #
  # NB: because this location sets its own proxy_set_header (Cookie ""),
  # nginx does NOT inherit ANY proxy_set_header from the server level here
  # (an nginx inheritance gotcha — a location with its own proxy_set_header
  # gets none from its parent) — Host/X-Forwarded-Proto/X-Real-IP/
  # X-Forwarded-For are repeated explicitly for exactly that reason.
  location ~ ^/(kn/)?(ward/[^/]+/issues|data)$ {
    proxy_set_header Cookie "";
    proxy_ignore_headers Set-Cookie;
    proxy_set_header Host bangalore-votes.opencity.in;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_cache pages;
    proxy_cache_key "$scheme$host$uri";
    proxy_cache_valid 200 5m;
    proxy_cache_use_stale error timeout updating;
    proxy_cache_background_update on;
    proxy_pass http://app:4321;
  }

  # --- everything else: public, anonymous-cacheable pages (architecture
  # §5). Cookie-stripped on the way to the app (the cache-safety
  # invariant — a page behind this location must never vary by session;
  # src/middleware.ts + every route it guards never sets a cookie on a
  # public GET, and Guard 1 of tests/routes/cache-invariant.test.ts proves
  # it end to end) and Set-Cookie stripped on the way back, belt-and-braces.
  # Cache key is QUERY-BLIND ($uri, no $args) — `?src=` partner attribution
  # (src/lib/attribution.ts) is read client-side only, never branches the
  # server response, so ignoring the query string is exactly right, not a
  # bug (see that module's own docstring).
  location / {
    proxy_set_header Cookie "";
    proxy_ignore_headers Set-Cookie;
    proxy_cache pages;
    proxy_cache_key "$scheme$host$uri";
    proxy_cache_valid 200 60s;
    proxy_cache_use_stale error timeout updating;
    proxy_cache_background_update on;
    proxy_set_header Host bangalore-votes.opencity.in;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_pass http://app:4321;
  }
}

# HTTP -> HTTPS redirect + ACME challenge passthrough for the production
# hostname (certbot's HTTP-01 validation hits port 80 first).
server {
  listen 80;
  listen [::]:80;
  server_name bangalore-votes.opencity.in staging.bangalore-votes.opencity.in;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# ---------------------------------------------------------------------------
# 2. Unmatched Host / SNI -> reject rather than serve any cert or content
#    (architecture §14.5's Cloud Firewall only restricts ports; this is the
#    nginx-level equivalent for hostname squatting / domain fronting).
# ---------------------------------------------------------------------------
server {
  listen 443 ssl default_server;
  listen [::]:443 ssl default_server;
  ssl_reject_handshake on;
}

# ---------------------------------------------------------------------------
# 3. Staging — invisible to the public (architecture §14.2): basic auth +
#    noindex, proxies to the separate app-staging:4321 container. Certs,
#    the htpasswd file, and the shared network/volumes are Task 61/63's
#    concern (this file only assumes their paths below).
# ---------------------------------------------------------------------------
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name staging.bangalore-votes.opencity.in;

  ssl_certificate     /etc/letsencrypt/live/staging.bangalore-votes.opencity.in/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/staging.bangalore-votes.opencity.in/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  include /etc/nginx/snippets/security-headers.conf;
  add_header X-Robots-Tag noindex always;

  auth_basic "Staging — authorized testers only";
  auth_basic_user_file /etc/nginx/staging.htpasswd;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
    auth_basic off;
  }

  # No cache anywhere on staging — it exists to test the real app behavior
  # (including cache-relevant behavior) against a real deploy, not to
  # exercise nginx's cache a second time; every request reaches
  # app-staging directly.
  location / {
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_pass http://app-staging:4321;
  }
}
