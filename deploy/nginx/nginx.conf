# nginx main config (Task 60, architecture.md §5/§7/§14).
#
# This is the SHARED nginx container from architecture §14.2: it terminates
# TLS for both `bangalore-votes.opencity.in` (production) and
# `staging.bangalore-votes.opencity.in` (staging) and reverse-proxies to the
# per-environment `app`/`app-staging` containers (Task 61 Compose stacks —
# those service names and the shared certbot/webroot volumes this config
# expects are defined there, not here).
#
# CSP NOTE (load-bearing, see src/lib/csp.ts): this file's snippets
# deliberately do NOT set Content-Security-Policy anywhere. The app
# (src/middleware.ts) emits that header per request, keyed to the same
# per-request script nonce it bakes into the HTML — nginx cannot mint a
# matching nonce for a cached response, so nginx's only job re: CSP is to
# NOT strip or override the upstream header (the default proxy behavior
# already passes upstream headers through untouched; nothing extra needed).

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /run/nginx.pid;

events {
  worker_connections  1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format main
    '$remote_addr - $remote_user [$time_local] "$request" '
    '$status $body_bytes_sent "$http_referer" '
    '"$http_user_agent" "$http_x_forwarded_for" '
    'cache=$upstream_cache_status rt=$request_time';

  access_log /var/log/nginx/access.log main;

  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;

  # Compression for text-ish responses only — HTML/CSS/JS/JSON/SVG; never
  # images/fonts (already compressed) or anything under /media (Task 35
  # user-uploaded photos/PDFs, already compressed formats).
  gzip on;
  gzip_vary on;
  gzip_min_length 512;
  gzip_types
    text/plain
    text/css
    text/xml
    application/json
    application/javascript
    application/xml+rss
    application/geo+json
    image/svg+xml;

  # Rate-limit zones (limit_req_zone) and the shared page cache
  # (proxy_cache_path) are both http-context-only directives — defined once
  # here, applied per-location in conf.d/site.conf.
  include /etc/nginx/snippets/rate-limits.conf;
  include /etc/nginx/snippets/cache.conf;

  # Docker's embedded DNS (127.0.0.11 on every user-defined network) —
  # required so `proxy_pass` to `app-staging` (conf.d/site.conf's third
  # server block) can use a variable instead of a bare hostname (Task 61
  # note below/added there). Plain `proxy_pass http://app-staging:4321`
  # resolves the hostname ONCE at nginx startup/reload and hard-fails
  # ("host not found in upstream") if that name doesn't exist yet — exactly
  # what happens the moment this shared nginx (owned by the PRODUCTION
  # stack, architecture §14.2) starts before the SEPARATE staging Compose
  # project has created `app-staging` (confirmed empirically bringing the
  # two stacks up independently for Task 61's verification). Routing that
  # one proxy_pass through a variable makes nginx re-resolve per request
  # instead, so production nginx no longer depends on staging's container
  # already existing to start or reload cleanly.
  resolver 127.0.0.11 valid=10s ipv6=off;

  server_tokens off;

  include /etc/nginx/conf.d/*.conf;
}
