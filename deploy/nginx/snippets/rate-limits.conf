# Rate-limit zones (Task 60, architecture.md §7). `limit_req_zone` only
# DEFINES a zone — it does not itself limit anything; each zone is applied
# with `limit_req zone=<name> burst=<n> [nodelay];` in the location blocks
# that need it (conf.d/site.conf). 10m per zone (~160k tracked IPs each) is
# the same sizing for all three; the request RATE differs to match how
# aggressive each surface's own legitimate traffic looks.
#
# api: general JSON/API traffic (issue votes, flags, ward lookup, etc.) — a
# coarse backstop sized for CGNAT (many citizens sharing one carrier IP),
# not a precise per-user cap; per-user/per-action limits, where they exist,
# live in application code (e.g. OTP throttling in src/lib/otp.ts), not here.
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

# otp: OTP request/verify endpoints — deliberately much stricter than `api`.
# OTP delivery costs real money (SMS/WhatsApp/email) and is the one surface
# most attractive to abuse (bombing a phone number with OTP messages).
limit_req_zone $binary_remote_addr zone=otp:10m rate=2r/s;

# webhook: vendor (Twilio/SendGrid) callback traffic. Generous and in its
# OWN zone deliberately — these calls are signature-verified, not
# citizen-triggered (src/middleware.ts exempts /api/webhooks/* from the
# Origin/CSRF checks; Task 53), so a burst of legitimate vendor callbacks
# must never compete with — or be capped by — citizen-facing `api` traffic.
limit_req_zone $binary_remote_addr zone=webhook:10m rate=100r/s;
