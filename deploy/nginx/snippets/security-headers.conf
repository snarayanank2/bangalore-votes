# STATIC security headers ONLY (Task 60). Content-Security-Policy is
# DELIBERATELY ABSENT from this file — the app (src/middleware.ts +
# src/lib/csp.ts) emits that header per request, keyed to the same nonce it
# bakes into the HTML, so nginx cannot (and must not) set its own CSP here:
# doing so would either fight the upstream header (whichever nginx applies
# last wins/duplicates, per RFC — browsers intersect *multiple*
# Content-Security-Policy headers, which is never what anyone wants) or, if
# used with `proxy_hide_header`, silently drop the app's per-request nonce
# and break every nonce'd inline script on every page. This file is included
# inside each `server {}` block that proxies to the app (conf.d/site.conf);
# nginx's default proxy behavior already passes the upstream
# Content-Security-Policy header straight through untouched — no
# `proxy_hide_header`/`proxy_set_header` on it here, and none should ever be
# added.
add_header Strict-Transport-Security "max-age=63072000" always;
add_header X-Content-Type-Options nosniff always;
add_header Referrer-Policy strict-origin-when-cross-origin always;
