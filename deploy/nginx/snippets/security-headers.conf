# STATIC security headers ONLY (Task 60). Content-Security-Policy is
# DELIBERATELY ABSENT from this file — the app (src/middleware.ts +
# src/lib/csp.ts) emits that header per request, keyed to the same nonce it
# bakes into the HTML, so nginx cannot (and must not) set its own CSP here:
# doing so would either fight the upstream header (whichever nginx applies
# last wins/duplicates, per RFC — browsers intersect *multiple*
# Content-Security-Policy headers, which is never what anyone wants) or, if
# used with `proxy_hide_header`, silently drop the app's per-request nonce
# and break every nonce'd inline script on every page. This file is included
# inside each `server {}` block that proxies to the app (conf.d/site.conf);
# nginx's default proxy behavior already passes the upstream
# Content-Security-Policy header straight through untouched — no
# `proxy_hide_header`/`proxy_set_header` on it here, and none should ever be
# added.
add_header Strict-Transport-Security "max-age=63072000" always;
add_header X-Content-Type-Options nosniff always;
add_header Referrer-Policy strict-origin-when-cross-origin always;

# X-Cache-Status (Task 65): lets the k6 election-day load test
# (tests/load/k6-election-day.js) prove the micro-cache is absorbing load
# rather than the app origin. Added HERE, inside the shared snippet, rather
# than as a per-location add_header — the inheritance gotcha documented
# elsewhere in this file's sibling conf.d/site.conf (a location with its
# OWN add_header inherits none of this file's directives) only bites a
# location that adds its own header; every location that instead relies on
# inheriting this whole snippet (the public "/" location, the
# ward-issues/data location, and both via the server-level `include`) picks
# this line up for free, with no other location's headers affected. Safe
# to add a line here; NOT safe to add add_header piecemeal inside
# individual proxy locations in site.conf.
#
# $upstream_cache_status is empty/"-" on locations that don't use
# proxy_cache at all (most of them) — harmless, and actually useful signal
# that a given path is intentionally uncached.
add_header X-Cache-Status $upstream_cache_status always;
