# Anonymous-page micro-cache (Task 60, architecture.md §5). One shared
# cache zone for every cacheable location (public pages, /media, /data —
# see conf.d/site.conf); each location sets its own `proxy_cache_valid` TTL
# on top of this shared store.
#
# levels=1:2: two-level directory hash (nginx's own recommendation) so a
# large cache doesn't dump millions of files into one directory.
# keys_zone=pages:50m: ~50 MB of KEY METADATA in shared memory (NOT the
# cached bodies themselves, which live under the path below) — nginx's own
# rule of thumb is ~8KB of real storage tracked per 1KB of zone, so 50m
# comfortably indexes the max_size below with room to spare.
# max_size=2g: hard cap on-disk; nginx evicts least-recently-used entries
# once it's reached, well within this box's 4GB RAM / disk budget
# (architecture §14.1).
# inactive=10m: an entry not requested for 10 minutes is evicted even if
# still "fresh" per its proxy_cache_valid TTL — every public page's TTL
# here (60s or 5m) is far shorter than 10m, so in practice TTL expiry, not
# this inactivity window, is what drives eviction; this is a safety net
# against a pathologically large long-tail of rarely-hit URLs (e.g. every
# individual candidate/ward permutation) accumulating forever.
proxy_cache_path /var/cache/nginx/pages levels=1:2 keys_zone=pages:50m max_size=2g inactive=10m;
